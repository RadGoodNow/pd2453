//PD2454 conf

speaker cmd start
cat /sys/kernel/audio-smartpa-0/reg
cat /sys/kernel/audio-smartpa-1/reg
speaker cmd end

headphone cmd start
cat /sys/class/wcd-usbss/registers
cat /sys/class/wcd939x-codec/registers
headphone cmd end

hifi cmd start
cat /sys/class/wcd-usbss/registers
cat /sys/class/wcd939x-codec/registers
hifi cmd end

receiver cmd start
cat /sys/kernel/audio-smartpa-0/reg
receiver cmd end

input_buildin_mic cmd start
cat /sys/class/wcd939x-codec/registers
cat /sys/class/wcd939x-slave.e01170223/registers
cat /sys/class/wcd939x-slave.e01170224/registers
cat /sys/class/soc:spf_core_platform:lpass-cdc/_0_tx_registers
cat /sys/class/soc:spf_core_platform:lpass-cdc/_1_rx_registers
cat /sys/class/va_swr_ctrl/registers
cat /sys/class/va_swr_ctrl/registers
cat /sys/class/va_swr_ctrl/registers
input_buildin_mic cmd end

input_headset_mic cmd start
cat /sys/class/wcd-usbss/registers
cat /sys/class/wcd939x-codec/registers
cat /sys/class/wcd939x-slave.e01170223/registers
cat /sys/class/wcd939x-slave.e01170224/registers
cat /sys/class/soc:spf_core_platform:lpass-cdc/_0_tx_registers
cat /sys/class/soc:spf_core_platform:lpass-cdc/_1_rx_registers
cat /sys/class/va_swr_ctrl/registers
cat /sys/class/va_swr_ctrl/registers
cat /sys/class/va_swr_ctrl/registers
input_headset_mic cmd end






